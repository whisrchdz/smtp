<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMTP Tester</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f2f5f9;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#2563eb;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.full{
    grid-column:1 / -1;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    min-height:260px;
    resize:vertical;
}

button{
    width:100%;
    padding:16px;
    margin-top:25px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#status{
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    display:none;
}

.success{
    background:#dcfce7;
    color:#166534;
}

.error{
    background:#fee2e2;
    color:#991b1b;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

}
</style>

</head>
<body>

<div class="container">

<h1>SMTP Tester</h1>

<form id="smtpForm">

<div class="grid">

<div>
<label>SMTP Host</label>
<input type="text" id="smtp_host" placeholder="smtp.example.com" required>
</div>

<div>
<label>SMTP Port</label>
<input type="number" id="smtp_port" value="587" required>
</div>

<div>
<label>Username</label>
<input type="email" id="username" required>
</div>

<div>
<label>Password</label>
<input type="password" id="password" required>
</div>

<div>
<label>Sender Name</label>
<input type="text" id="sender_name" value="SMTP Tester">
</div>

<div>
<label>Sender Email</label>
<input type="email" id="sender_email">
</div>

<div>
<label>Recipient</label>
<input type="email" id="recipient" required>
</div>

<div>
<label>Subject</label>
<input type="text" id="subject" value="SMTP Test">
</div>

<div class="full">

<label>HTML Email</label>

<textarea id="html">
<!DOCTYPE html>
<html>
<body>
<h2>Hello!</h2>
<p>This is a test email.</p>
</body>
</html>
</textarea>

</div>

</div>

<button type="submit">Send Test Email</button>

<div id="status"></div>

</form>

</div>

<script>

const form=document.getElementById("smtpForm");
const status=document.getElementById("status");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

status.style.display="block";
status.className="";
status.innerHTML="Sending...";

const data={

smtp_host:document.getElementById("smtp_host").value,
smtp_port:Number(document.getElementById("smtp_port").value),
username:document.getElementById("username").value,
password:document.getElementById("password").value,
sender_name:document.getElementById("sender_name").value,
sender_email:document.getElementById("sender_email").value,
recipient:document.getElementById("recipient").value,
subject:document.getElementById("subject").value,
html:document.getElementById("html").value

};

try{

const res=await fetch("/api/send",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

const result=await res.json();

if(res.ok){

status.className="success";
status.innerHTML="✅ Email sent successfully.";

}else{

status.className="error";
status.innerHTML="❌ "+(result.error||"Unknown error");

}

}catch(err){

status.className="error";
status.innerHTML="❌ "+err.message;

}

});

</script>

</body>
</html>
